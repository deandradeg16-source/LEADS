<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel ViaTec</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg: #f4f8fc;
      --panel: #ffffff;
      --panel-2: #f8fbff;
      --text: #102033;
      --muted: #64748b;
      --border: #d9e5f2;
      --primary: #0ea5e9;
      --primary-dark: #0b79b0;
      --green: #10b981;
      --green-soft: #dcfce7;
      --blue-soft: #e0f2fe;
      --yellow: #f59e0b;
      --yellow-soft: #fef3c7;
      --red: #ef4444;
      --red-soft: #fee2e2;
      --shadow: 0 18px 45px rgba(16, 32, 51, 0.08);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top right, rgba(14,165,233,0.08), transparent 18%),
        radial-gradient(circle at bottom left, rgba(16,185,129,0.08), transparent 18%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 1380px;
      margin: 0 auto;
    }

    .hidden {
      display: none !important;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .login-box {
      max-width: 430px;
      margin: 60px auto 0;
      padding: 28px;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.96rem;
      outline: none;
      transition: 0.2s ease;
      font-family: inherit;
    }

    .field textarea {
      min-height: 72px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.10);
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      font-family: inherit;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .btn-green {
      background: linear-gradient(135deg, #16a34a, var(--green));
      color: white;
    }

    .btn-secondary {
      background: #f8fafc;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: #fff1f2;
      color: #be123c;
      border: 1px solid #fecdd3;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .header h1 {
      font-family: 'Orbitron', sans-serif;
      color: #0f3c68;
      font-size: clamp(1.5rem, 3vw, 2.4rem);
      margin-bottom: 8px;
    }

    .header p {
      color: var(--muted);
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat {
      padding: 18px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 0.94rem;
      margin-bottom: 8px;
    }

    .stat .value {
      font-size: 2rem;
      font-weight: 800;
      color: #0f3c68;
    }

    .panel {
      padding: 18px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.3fr 0.8fr auto auto;
      gap: 12px;
      margin-bottom: 16px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel-2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1220px;
      background: white;
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid #edf2f7;
      font-size: 0.95rem;
    }

    th {
      background: #f8fbff;
      color: #33526f;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody tr:hover {
      background: #fbfdff;
    }

    .lead-name {
      font-weight: 700;
      color: #0f2942;
    }

    .lead-sub {
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 4px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.83rem;
      font-weight: 700;
      border: 1px solid transparent;
      margin-bottom: 8px;
    }

    .status-novo {
      background: var(--blue-soft);
      color: #0369a1;
      border-color: #bae6fd;
    }

    .status-contato {
      background: var(--yellow-soft);
      color: #b45309;
      border-color: #fde68a;
    }

    .status-fechado {
      background: var(--green-soft);
      color: #047857;
      border-color: #bbf7d0;
    }

    .status-perdido {
      background: var(--red-soft);
      color: #b91c1c;
      border-color: #fecaca;
    }

    .row-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .row-actions button,
    .row-actions select {
      width: 100%;
    }

    .obs-box {
      display: grid;
      gap: 8px;
    }

    .obs-box textarea {
      min-height: 64px;
      background: #fff;
    }

    .status-line {
      display: grid;
      gap: 8px;
    }

    .empty {
      display: none;
      padding: 28px 12px;
      text-align: center;
      color: var(--muted);
      background: white;
    }

    .status-msg {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .login-status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 1100px) {
      .stats {
        grid-template-columns: repeat(2, minmax(160px, 1fr));
      }

      .toolbar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .login-box {
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section id="loginSection" class="card login-box">
      <div class="logo">Painel ViaTec</div>
      <div class="subtitle">Entre com seu usuário administrador para acessar os leads.</div>

      <div class="field">
        <label for="loginEmail">E-mail</label>
        <input type="email" id="loginEmail" placeholder="Seu e-mail de admin">
      </div>

      <div class="field">
        <label for="loginPassword">Senha</label>
        <input type="password" id="loginPassword" placeholder="Sua senha">
      </div>

      <button class="btn btn-primary" id="loginBtn">Entrar</button>
      <div class="login-status" id="loginStatus"></div>
    </section>

    <section id="adminSection" class="hidden">
      <div class="header">
        <div>
          <h1>Painel ViaTec</h1>
          <p>Leads captados na roleta promocional.</p>
        </div>

        <div class="header-actions">
          <button class="btn btn-secondary" id="refreshBtn">Atualizar</button>
          <button class="btn btn-green" id="exportBtn">Exportar CSV</button>
          <button class="btn btn-danger" id="logoutBtn">Sair</button>
        </div>
      </div>

      <div class="stats">
        <div class="card stat">
          <div class="label">Total de leads</div>
          <div class="value" id="cardTotal">0</div>
        </div>
        <div class="card stat">
          <div class="label">Novos</div>
          <div class="value" id="cardNovos">0</div>
        </div>
        <div class="card stat">
          <div class="label">Em contato</div>
          <div class="value" id="cardContato">0</div>
        </div>
        <div class="card stat">
          <div class="label">Fechados</div>
          <div class="value" id="cardFechados">0</div>
        </div>
      </div>

      <div class="card panel">
        <div class="toolbar">
          <input type="text" id="searchInput" placeholder="Buscar por nome, telefone, cidade, prêmio ou observação">
          <select id="statusFilter">
            <option value="">Todos os status</option>
            <option value="Novo">Novo</option>
            <option value="Em contato">Em contato</option>
            <option value="Fechado">Fechado</option>
            <option value="Perdido">Perdido</option>
          </select>
          <button class="btn btn-secondary" id="clearFiltersBtn">Limpar filtros</button>
          <button class="btn btn-primary" id="reloadBtn">Recarregar</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Lead</th>
                <th>Telefone</th>
                <th>Cidade</th>
                <th>Prêmio</th>
                <th>Data</th>
                <th>Status</th>
                <th>Observações</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="leadsBody"></tbody>
          </table>
          <div class="empty" id="emptyMsg">Nenhum lead encontrado.</div>
        </div>

        <div class="status-msg" id="statusMsg"></div>
      </div>
    </section>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://plkvgekbngrznillyupa.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_4g8etYpP50dsAgXZsM8nfg_Mu6roIt0";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginSection = document.getElementById("loginSection");
    const adminSection = document.getElementById("adminSection");
    const loginEmail = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");
    const loginBtn = document.getElementById("loginBtn");
    const loginStatus = document.getElementById("loginStatus");

    const leadsBody = document.getElementById("leadsBody");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const statusMsg = document.getElementById("statusMsg");
    const emptyMsg = document.getElementById("emptyMsg");

    const cardTotal = document.getElementById("cardTotal");
    const cardNovos = document.getElementById("cardNovos");
    const cardContato = document.getElementById("cardContato");
    const cardFechados = document.getElementById("cardFechados");

    let todosLeads = [];

    function mostrarAdmin() {
      loginSection.classList.add("hidden");
      adminSection.classList.remove("hidden");
    }

    function mostrarLogin() {
      adminSection.classList.add("hidden");
      loginSection.classList.remove("hidden");
    }

    function formatarData(dataIso) {
      if (!dataIso) return "-";
      return new Date(dataIso).toLocaleString("pt-BR");
    }

    function normalizarTelefone(telefone) {
      return (telefone || "").replace(/\D/g, "");
    }

    function gerarMensagem(nome, premio) {
      if ((premio || "").includes("INSTALAÇÃO")) {
        return `Olá ${nome}, tudo bem? Aqui é da ViaTec Telecom. Você ganhou instalação grátis na nossa ação promocional. Vamos ativar seu benefício?`;
      }

      if ((premio || "").includes("DESCONTO")) {
        return `Olá ${nome}, tudo bem? Aqui é da ViaTec Telecom. Você ganhou um desconto especial na nossa ação promocional. Quer aproveitar esse benefício?`;
      }

      return `Olá ${nome}, tudo bem? Aqui é da ViaTec Telecom. Você ganhou ${premio} na nossa ação promocional. Vamos dar sequência no seu benefício?`;
    }

    function abrirWhatsApp(nome, telefone, premio) {
      const tel = normalizarTelefone(telefone);
      if (!tel) {
        alert("Telefone inválido.");
        return;
      }

      const telefoneCompleto = tel.startsWith("55") ? tel : `55${tel}`;
      const mensagem = gerarMensagem(nome, premio);
      const url = `https://wa.me/${telefoneCompleto}?text=${encodeURIComponent(mensagem)}`;
      window.open(url, "_blank");
    }

    function classeStatus(status) {
      if (status === "Em contato") return "status-contato";
      if (status === "Fechado") return "status-fechado";
      if (status === "Perdido") return "status-perdido";
      return "status-novo";
    }

    function atualizarCards(lista) {
      const total = lista.length;
      const novos = lista.filter(l => (l.status || "Novo") === "Novo").length;
      const contato = lista.filter(l => l.status === "Em contato").length;
      const fechados = lista.filter(l => l.status === "Fechado").length;

      cardTotal.textContent = total;
      cardNovos.textContent = novos;
      cardContato.textContent = contato;
      cardFechados.textContent = fechados;
    }

    async function atualizarLead(id, patch) {
      const { error } = await supabase
        .from("leads")
        .update(patch)
        .eq("id", id);

      if (error) throw error;
    }

    function exportarCSV(lista) {
      if (!lista.length) {
        alert("Não há leads para exportar.");
        return;
      }

      const headers = ["Nome", "Email", "Telefone", "Cidade", "Premio", "Status", "Observacoes", "Data"];
      const rows = lista.map(l => [
        l.nome || "",
        l.email || "",
        l.telefone || "",
        l.cidade || "",
        l.premio || "",
        l.status || "Novo",
        l.observacoes || "",
        l.created_at || ""
      ]);

      const csv = [headers, ...rows]
        .map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(";"))
        .join("\n");

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "leads-viatec.csv";
      link.click();
    }

    function renderTabela(lista) {
      leadsBody.innerHTML = "";

      if (!lista.length) {
        emptyMsg.style.display = "block";
        return;
      }

      emptyMsg.style.display = "none";

      for (const lead of lista) {
        const tr = document.createElement("tr");
        const statusAtual = lead.status || "Novo";
        const obsAtual = lead.observacoes || "";

        tr.innerHTML = `
          <td>
            <div class="lead-name">${lead.nome || "-"}</div>
            <div class="lead-sub">${lead.email || "-"}</div>
          </td>
          <td>${lead.telefone || "-"}</td>
          <td>${lead.cidade || "-"}</td>
          <td>${lead.premio || "-"}</td>
          <td>${formatarData(lead.created_at)}</td>
          <td>
            <div class="status-line">
              <span class="pill ${classeStatus(statusAtual)}">${statusAtual}</span>
              <select data-id="${lead.id}" class="statusSelect">
                <option value="Novo" ${statusAtual === "Novo" ? "selected" : ""}>Novo</option>
                <option value="Em contato" ${statusAtual === "Em contato" ? "selected" : ""}>Em contato</option>
                <option value="Fechado" ${statusAtual === "Fechado" ? "selected" : ""}>Fechado</option>
                <option value="Perdido" ${statusAtual === "Perdido" ? "selected" : ""}>Perdido</option>
              </select>
            </div>
          </td>
          <td>
            <div class="obs-box">
              <textarea data-id="${lead.id}" class="obsInput" placeholder="Anotações...">${obsAtual}</textarea>
              <button class="btn btn-secondary saveObsBtn" data-id="${lead.id}">Salvar</button>
            </div>
          </td>
          <td>
            <div class="row-actions">
              <button class="btn btn-green whatsBtn" data-id="${lead.id}" data-nome="${encodeURIComponent(lead.nome || "")}" data-tel="${encodeURIComponent(lead.telefone || "")}" data-premio="${encodeURIComponent(lead.premio || "")}">
                WhatsApp
              </button>
            </div>
          </td>
        `;

        leadsBody.appendChild(tr);
      }

      document.querySelectorAll(".whatsBtn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          const nome = decodeURIComponent(btn.dataset.nome);
          const tel = decodeURIComponent(btn.dataset.tel);
          const premio = decodeURIComponent(btn.dataset.premio);

          abrirWhatsApp(nome, tel, premio);

          try {
            await atualizarLead(id, { status: "Em contato" });
            await carregarLeads();
            statusMsg.textContent = "Lead marcado como Em contato.";
          } catch (error) {
            console.error(error);
            statusMsg.textContent = "Erro ao atualizar status do lead.";
          }
        });
      });

      document.querySelectorAll(".statusSelect").forEach(select => {
        select.addEventListener("change", async () => {
          try {
            statusMsg.textContent = "Atualizando status...";
            await atualizarLead(select.dataset.id, { status: select.value });
            await carregarLeads();
            statusMsg.textContent = "Status atualizado.";
          } catch (error) {
            console.error(error);
            statusMsg.textContent = "Erro ao atualizar status.";
          }
        });
      });

      document.querySelectorAll(".saveObsBtn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          const textarea = document.querySelector(`.obsInput[data-id="${id}"]`);

          try {
            statusMsg.textContent = "Salvando observação...";
            await atualizarLead(id, { observacoes: textarea.value });
            await carregarLeads();
            statusMsg.textContent = "Observação salva.";
          } catch (error) {
            console.error(error);
            statusMsg.textContent = "Erro ao salvar observação.";
          }
        });
      });
    }

    function aplicarFiltro() {
      const termo = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;

      let lista = [...todosLeads];

      if (termo) {
        lista = lista.filter((lead) =>
          (lead.nome || "").toLowerCase().includes(termo) ||
          (lead.email || "").toLowerCase().includes(termo) ||
          (lead.telefone || "").toLowerCase().includes(termo) ||
          (lead.cidade || "").toLowerCase().includes(termo) ||
          (lead.premio || "").toLowerCase().includes(termo) ||
          (lead.observacoes || "").toLowerCase().includes(termo)
        );
      }

      if (status) {
        lista = lista.filter((lead) => (lead.status || "Novo") === status);
      }

      renderTabela(lista);
      atualizarCards(lista);
    }

    async function carregarLeads() {
      statusMsg.textContent = "Carregando leads...";

      const { data, error } = await supabase
        .from("leads")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        statusMsg.textContent = "Erro ao carregar leads.";
        return;
      }

      todosLeads = data || [];
      aplicarFiltro();
      statusMsg.textContent = `${todosLeads.length} lead(s) carregado(s).`;
    }

    async function login() {
      loginStatus.textContent = "Entrando...";

      const { error } = await supabase.auth.signInWithPassword({
        email: loginEmail.value.trim(),
        password: loginPassword.value
      });

      if (error) {
        loginStatus.textContent = "E-mail ou senha inválidos.";
        return;
      }

      loginStatus.textContent = "";
      mostrarAdmin();
      await carregarLeads();
    }

    async function logout() {
      await supabase.auth.signOut();
      mostrarLogin();
      loginPassword.value = "";
      statusMsg.textContent = "";
    }

    loginBtn.addEventListener("click", login);
    document.getElementById("logoutBtn").addEventListener("click", logout);
    document.getElementById("refreshBtn").addEventListener("click", carregarLeads);
    document.getElementById("reloadBtn").addEventListener("click", carregarLeads);
    document.getElementById("exportBtn").addEventListener("click", () => exportarCSV(todosLeads));
    document.getElementById("clearFiltersBtn").addEventListener("click", () => {
      searchInput.value = "";
      statusFilter.value = "";
      aplicarFiltro();
    });

    searchInput.addEventListener("input", aplicarFiltro);
    statusFilter.addEventListener("change", aplicarFiltro);

    const { data: authData } = await supabase.auth.getSession();
    if (authData.session) {
      mostrarAdmin();
      await carregarLeads();
    } else {
      mostrarLogin();
    }
  </script>
</body>
</html>
