<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel ViaTec</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Inter:wght@400;500;600;700&display=swap');

    :root{
      --bg:#06101d;
      --bg-2:#08182b;
      --sidebar:#05101d;
      --card:#0a1a2d;
      --card-2:#0d2138;
      --line:#17314e;
      --text:#edf6ff;
      --muted:#8da7c2;
      --blue:#1e90ff;
      --blue-2:#0ea5e9;
      --green:#16c784;
      --green-2:#0fd47a;
      --yellow:#f6c445;
      --red:#ef5350;
      --shadow:0 18px 45px rgba(0,0,0,.28);
    }

    *{ margin:0; padding:0; box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    body{
      font-family:'Inter',sans-serif;
      background:
        radial-gradient(circle at top right, rgba(30,144,255,.10), transparent 18%),
        radial-gradient(circle at bottom left, rgba(22,199,132,.10), transparent 18%),
        linear-gradient(180deg, #050d18 0%, #071321 100%);
      color:var(--text);
      min-height:100vh;
    }

    .hidden{ display:none !important; }

    /* Login Styles */
    .login-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .login-card{
      width:100%; max-width:440px; background:rgba(10,26,45,.92); border:1px solid var(--line);
      border-radius:24px; padding:28px; box-shadow:var(--shadow); backdrop-filter:blur(14px);
    }
    .login-logo{ font-family:'Orbitron',sans-serif; font-size:2rem; color:#66c7ff; margin-bottom:8px; }
    .login-sub{ color:var(--muted); margin-bottom:20px; line-height:1.5; }

    /* Form Elements */
    .field{ margin-bottom:14px; }
    .field label{ display:block; font-size:.92rem; font-weight:600; margin-bottom:8px; color:#dceeff; }
    .field input, .field select, .field textarea{
      width:100%; border:1px solid var(--line); background:#081524; color:#fff;
      border-radius:14px; padding:12px 14px; font-size:.95rem; outline:none; transition:.2s ease; font-family:inherit;
    }
    .field input:focus{ border-color:#2b9cff; box-shadow:0 0 0 4px rgba(30,144,255,.12); }

    /* Buttons */
    .btn{ border:none; border-radius:14px; padding:12px 16px; cursor:pointer; font-weight:700; transition:.2s ease; font-family:inherit; white-space:nowrap; }
    .btn:hover{ transform:translateY(-1px); }
    .btn-primary{ background:linear-gradient(135deg, var(--blue), var(--blue-2)); color:#fff; }
    .btn-green{ background:linear-gradient(135deg, var(--green), var(--green-2)); color:#03130c; }
    .btn-secondary{ background:#0d1b2c; border:1px solid var(--line); color:#fff; }
    .btn-danger{ background:#1b1014; border:1px solid rgba(239,83,80,.28); color:#ffd4d3; }

    /* App Layout */
    .app{ display:grid; grid-template-columns:260px 1fr; min-height:100vh; }
    .sidebar{
      background:linear-gradient(180deg, #04101c 0%, #051221 100%);
      border-right:1px solid rgba(255,255,255,.06); padding:24px 18px;
      display:flex; flex-direction:column; justify-content:space-between; position:sticky; top:0; height:100vh;
    }
    .brand img{ width:190px; filter:drop-shadow(0 0 10px rgba(30,144,255,.25)); }
    .nav-item{
      display:flex; align-items:center; gap:12px; padding:14px; border-radius:14px;
      color:#d7e8fb; text-decoration:none; font-weight:600; margin-bottom:4px; transition:.2s;
    }
    .nav-item:hover, .nav-item.active{ background:#0a1a2c; border:1px solid rgba(255,255,255,.04); }
    .nav-item.active{ background:linear-gradient(135deg, #0c4fb8, #0b69d1); color:#fff; }

    .main{ padding:24px; }
    .topbar{ display:flex; justify-content:space-between; margin-bottom:18px; }
    .title-box h1{ font-family:'Orbitron',sans-serif; color:#e8f6ff; }

    /* Stats Cards */
    .stats{ display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; margin-bottom:18px; }
    .stat{ background:#0b1b2f; border:1px solid var(--line); border-radius:20px; padding:18px; position:relative; }
    .stat-value{ font-family:'Orbitron',sans-serif; font-size:2rem; }

    /* Filter & Table */
    .filters-card{ background:#0a1b2f; border:1px solid var(--line); border-radius:24px; padding:18px; margin-bottom:18px; }
    .filters-grid{ display:grid; grid-template-columns:1.4fr .8fr auto auto; gap:12px; }
    .quick-filters{ display:flex; gap:10px; margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,.06); }
    .quick-btn{ background:#0d1b2c; border:1px solid var(--line); color:#fff; padding:8px 12px; border-radius:10px; cursor:pointer; }
    .quick-btn.active{ background:var(--blue); }

    .table-card{ background:#0a1b2f; border:1px solid var(--line); border-radius:24px; overflow:hidden; }
    table{ width:100%; border-collapse:collapse; min-width:1000px; }
    thead th{ padding:16px; color:var(--muted); text-align:left; border-bottom:1px solid var(--line); }
    tbody td{ padding:14px; border-bottom:1px solid rgba(255,255,255,.05); }

    /* Status Pills */
    .status-pill{ padding:6px 12px; border-radius:20px; font-size:.8rem; font-weight:bold; cursor:pointer; border:1px solid transparent; }
    .status-novo{ background:rgba(30,144,255,.1); color:#6bc5ff; }
    .status-contato{ background:rgba(246,196,69,.1); color:#ffd86c; }
    .status-fechado{ background:rgba(22,199,132,.1); color:#57e9ab; }
    .status-perdido{ background:rgba(239,83,80,.1); color:#ff9d9b; }

    .status-dropdown{ position:absolute; background:#0b1b2f; border:1px solid var(--line); border-radius:12px; padding:8px; z-index:100; display:grid; gap:4px; }
    .status-option{ background:transparent; color:#fff; border:none; padding:8px; text-align:left; cursor:pointer; border-radius:6px; }
    .status-option:hover{ background:var(--line); }

    .whatsIconBtn{ background:var(--green); border:none; border-radius:10px; padding:8px; cursor:pointer; font-size:1.2rem; }
    .status-msg{ position:fixed; bottom:20px; right:20px; background:var(--blue); padding:10px 20px; border-radius:10px; z-index:1000; display:none; }

    @media (max-width:980px){ .app{ grid-template-columns:1fr; } .sidebar{ display:none; } }
  </style>
</head>
<body>

  <div id="statusMsg" class="status-msg"></div>

  <div id="loginSection" class="login-wrap">
    <div class="login-card">
      <div class="login-logo">ViaTec Admin</div>
      <div class="login-sub">Acesse o gerenciador de leads.</div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="loginEmail" placeholder="admin@viatec.com.br">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" id="loginBtn" style="width:100%">Entrar no Painel</button>
      <div id="loginStatus" style="color:var(--red); margin-top:10px; font-size:.9rem;"></div>
    </div>
  </div>

  <div id="adminSection" class="app hidden">
    <aside class="sidebar">
      <div>
        <div class="brand"><img src="logo-viatec.png" alt="ViaTec"></div>
        <nav class="nav">
          <a class="nav-item active" href="#"><span class="nav-icon">▦</span> Dashboard</a>
          <a class="nav-item" href="#leads"><span class="nav-icon">◎</span> Leads</a>
          <a class="nav-item" href="#exportacoes"><span class="nav-icon">⇪</span> Exportar</a>
        </nav>
      </div>
      <div class="side-footer"><strong>ViaTec Telecom</strong><br>© 2026</div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title-box">
          <h1>Painel de Leads</h1>
          <p>Gestão de capturas da roleta promocional.</p>
        </div>
        <div class="top-actions">
          <button class="btn btn-secondary" id="refreshBtn">Atualizar</button>
          <button class="btn btn-danger" id="logoutBtn">Sair</button>
        </div>
      </div>

      <section class="stats">
        <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="cardTotal">0</div></div>
        <div class="stat"><div class="stat-label">Novos</div><div class="stat-value" id="cardNovos">0</div></div>
        <div class="stat"><div class="stat-label">Em Aberto</div><div class="stat-value" id="cardContato">0</div></div>
        <div class="stat"><div class="stat-label">Fechados</div><div class="stat-value" id="cardFechados">0</div></div>
      </section>

      <section class="filters-card">
        <div class="filters-grid">
          <input type="text" id="searchInput" placeholder="Buscar por nome, telefone ou prêmio...">
          <select id="statusFilter">
            <option value="">Todos os status</option>
            <option value="Novo">Novo</option>
            <option value="Iniciado">Iniciado</option>
            <option value="Fechado">Fechado</option>
            <option value="Perdido">Perdido</option>
          </select>
          <button class="btn btn-secondary" id="clearFiltersBtn">Limpar</button>
          <button class="btn btn-green" id="exportBtn">Exportar CSV</button>
        </div>
        <div class="quick-filters">
          <button class="quick-btn active" data-status="">Todos</button>
          <button class="quick-btn" data-status="Novo">Novos</button>
          <button class="quick-btn" data-status="Iniciado">Iniciados</button>
          <button class="quick-btn" data-status="Fechado">Fechados</button>
        </div>
      </section>

      <section class="table-card">
        <div style="overflow-x: auto;">
          <table>
            <thead>
              <tr>
                <th>Lead</th>
                <th>Telefone</th>
                <th>Cidade</th>
                <th>Prêmio</th>
                <th>Status</th>
                <th>Observações</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="leadsBody"></tbody>
          </table>
        </div>
        <div id="emptyMsg" class="hidden" style="padding:40px; text-align:center; color:var(--muted);">Nenhum lead encontrado.</div>
      </section>
    </main>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://plkvgekbngrznillyupa.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_4g8etYpP50dsAgXZsM8nfg_Mu6roIt0";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Seletores
    const loginSection = document.getElementById("loginSection");
    const adminSection = document.getElementById("adminSection");
    const leadsBody = document.getElementById("leadsBody");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const statusMsg = document.getElementById("statusMsg");
    const emptyMsg = document.getElementById("emptyMsg");

    let todosLeads = [];

    // Funções de Interface
    function showMsg(txt) {
      statusMsg.textContent = txt;
      statusMsg.style.display = "block";
      setTimeout(() => statusMsg.style.display = "none", 3000);
    }

    function mostrarAdmin() { loginSection.classList.add("hidden"); adminSection.classList.remove("hidden"); }
    function mostrarLogin() { adminSection.classList.add("hidden"); loginSection.classList.remove("hidden"); }

    // Lógica de Dados
    async function carregarLeads() {
      try {
        const { data, error } = await supabase.from("leads").select("*").order("created_at", { ascending: false });
        if (error) throw error;
        todosLeads = data || [];
        atualizarStats();
        aplicarFiltros();
      } catch (e) { console.error(e); showMsg("Erro ao carregar dados."); }
    }

    function atualizarStats() {
      document.getElementById("cardTotal").textContent = todosLeads.length;
      document.getElementById("cardNovos").textContent = todosLeads.filter(l => (l.status || "Novo") === "Novo").length;
      document.getElementById("cardContato").textContent = todosLeads.filter(l => l.status === "Iniciado").length;
      document.getElementById("cardFechados").textContent = todosLeads.filter(l => l.status === "Fechado").length;
    }

    async function atualizarStatusLead(id, novoStatus) {
      try {
        const { error } = await supabase.from("leads").update({ status: novoStatus }).eq("id", id);
        if (error) throw error;
        showMsg("Status atualizado!");
        carregarLeads();
      } catch (e) { showMsg("Erro ao salvar."); }
    }

    async function salvarObs(id, texto) {
      await supabase.from("leads").update({ observacoes: texto }).eq("id", id);
      showMsg("Observação salva.");
    }

    // Filtros e Busca
    function aplicarFiltros() {
      const termo = searchInput.value.toLowerCase();
      const statusValue = statusFilter.value;

      const filtrados = todosLeads.filter(l => {
        const matchesStatus = statusValue === "" || (l.status || "Novo") === statusValue;
        const matchesSearch = [l.nome, l.telefone, l.premio, l.cidade].some(field => 
          String(field || "").toLowerCase().includes(termo)
        );
        return matchesStatus && matchesSearch;
      });

      renderTabela(filtrados);
    }

    function renderTabela(lista) {
      leadsBody.innerHTML = "";
      emptyMsg.classList.toggle("hidden", lista.length > 0);

      lista.forEach(lead => {
        const tr = document.createElement("tr");
        const status = lead.status || "Novo";
        const classeStatus = `status-pill status-${status.toLowerCase()}`;

        tr.innerHTML = `
          <td><strong>${lead.nome || 'Sem nome'}</strong><br><small>${lead.email || '-'}</small></td>
          <td>${lead.telefone || '-'}</td>
          <td>${lead.cidade || '-'}</td>
          <td>${lead.premio || '-'}</td>
          <td style="position:relative">
            <button class="${classeStatus}" onclick="document.getElementById('drop-${lead.id}').classList.toggle('hidden')">${status}</button>
            <div id="drop-${lead.id}" class="status-dropdown hidden">
              <button class="status-option" data-id="${lead.id}" data-status="Novo">Novo</button>
              <button class="status-option" data-id="${lead.id}" data-status="Iniciado">Iniciado</button>
              <button class="status-option" data-id="${lead.id}" data-status="Fechado">Fechado</button>
              <button class="status-option" data-id="${lead.id}" data-status="Perdido">Perdido</button>
            </div>
          </td>
          <td><textarea class="field obs-input" data-id="${lead.id}" style="min-height:50px">${lead.observacoes || ''}</textarea></td>
          <td>
            <button class="whatsIconBtn" onclick="window.open('https://wa.me/55${String(lead.telefone).replace(/\D/g,'')}?text=Olá ${lead.nome}, vimos que você ganhou ${lead.premio}!', '_blank')">💬</button>
          </td>
        `;
        leadsBody.appendChild(tr);
      });

      // Eventos internos da tabela
      document.querySelectorAll(".status-option").forEach(btn => {
        btn.onclick = () => atualizarStatusLead(btn.dataset.id, btn.dataset.status);
      });
      document.querySelectorAll(".obs-input").forEach(area => {
        area.onblur = () => salvarObs(area.dataset.id, area.value);
      });
    }

    // Exportar CSV
    function exportar() {
      let csv = "Nome;Telefone;Cidade;Premio;Status;Obs\n";
      todosLeads.forEach(l => {
        csv += `${l.nome};${l.telefone};${l.cidade};${l.premio};${l.status || 'Novo'};${l.observacoes || ''}\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'leads_viatec.csv';
      a.click();
    }

    // Eventos Globais
    document.getElementById("loginBtn").onclick = () => {
      const email = document.getElementById("loginEmail").value;
      const pass = document.getElementById("loginPassword").value;
      if(email && pass) { mostrarAdmin(); carregarLeads(); }
      else { document.getElementById("loginStatus").textContent = "Informe os dados de acesso."; }
    };

    document.getElementById("logoutBtn").onclick = mostrarLogin;
    document.getElementById("refreshBtn").onclick = carregarLeads;
    document.getElementById("exportBtn").onclick = exportar;
    document.getElementById("clearFiltersBtn").onclick = () => { searchInput.value = ""; statusFilter.value = ""; aplicarFiltros(); };

    searchInput.oninput = aplicarFiltros;
    statusFilter.onchange = aplicarFiltros;

    document.querySelectorAll(".quick-btn").forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(".quick-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        statusFilter.value = btn.dataset.status;
        aplicarFiltros();
      };
    });

  </script>
</body>
</html>
