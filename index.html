<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViaTec | Telecom</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Orbitron:wght@700;800&family=Rajdhani:wght@600;700&display=swap');

        :root {
            --primary: #00d4ff;
            --secondary: #00ff85;
            --dark-core: #010306;
            --panel-bg: rgba(10, 15, 25, 0.9);
            --border: rgba(0, 212, 255, 0.2);
            --wheel-size: 500px;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--dark-core);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            background: radial-gradient(circle at center, #0a172e 0%, #010306 100%);
            overflow-x: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 650px;
            padding: 20px;
            perspective: 1500px;
        }

        .logo-img {
            width: 60%;
            max-width: 320px;
            margin: 0 auto 30px;
            object-fit: contain;
            display: block;
            filter:
                drop-shadow(0 0 10px #00d4ff)
                drop-shadow(0 0 20px #00ff85);
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid var(--border);
            padding: 40px;
            text-align: center;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .panel-desc {
            opacity: 0.7;
            margin-bottom: 35px;
            font-size: 16px;
            letter-spacing: 1px;
        }

        #lead-form {
            display: none;
        }

        #wheel-game {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .promo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(32px, 7vw, 48px);
            text-transform: uppercase;
            margin-bottom: 5px;
            line-height: 0.85;
        }

        .promo-text span {
            color: var(--secondary);
            text-shadow: 0 0 20px rgba(0, 255, 133, 0.5);
        }

        .reward-badge {
            background: white;
            color: #010306;
            font-family: 'Montserrat', sans-serif;
            padding: 8px 18px;
            border-radius: 6px;
            font-size: 20px;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .input-group {
            width: 100%;
            position: relative;
            margin-bottom: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 18px 18px 18px 50px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: white;
            font-size: 17px;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary);
            outline: none;
            background: rgba(0, 212, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .input-group svg {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }

        .input-row {
            display: flex;
            gap: 14px;
            width: 100%;
        }

        .wheel-stage {
            position: relative;
            width: var(--wheel-size);
            height: var(--wheel-size);
            transform: rotateX(22deg);
            margin: 0 auto 20px;
        }

        .wheel-stage::after {
            content: '';
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 60px;
            background: rgba(0,0,0,0.8);
            filter: blur(30px);
            border-radius: 50%;
            z-index: -2;
        }

        .static-rim {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 18px solid #0f1a30;
            box-shadow:
                0 20px 0 #050810,
                0 30px 60px rgba(0,0,0,0.8),
                0 0 40px rgba(0, 212, 255, 0.15);
            z-index: -1;
        }

        #canvas {
            width: calc(100% - 36px);
            height: calc(100% - 36px);
            margin: 18px;
            border-radius: 50%;
            background: #070b14;
            transition: transform 9s cubic-bezier(0.15, 0, 0, 1);
            border: 2px solid rgba(255,255,255,0.03);
            display: block;
        }

        .pointer-scanner {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            filter: drop-shadow(0 0 15px var(--secondary));
        }

        .cyber-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, #1a2c4e, #05070a);
            border: 4px solid var(--primary);
            border-radius: 50%;
            z-index: 50;
            box-shadow: 0 15px 30px rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn {
            padding: 22px 60px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            transition: all 0.4s ease;
            width: 100%;
            font-size: 19px;
            letter-spacing: 3px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #005ce6 100%);
            color: white;
            box-shadow: 0 15px 35px rgba(0, 130, 255, 0.4);
        }

        .btn-spin {
            background: var(--secondary);
            color: #010306;
            width: auto;
            min-width: 220px;
            padding: 14px 30px;
            margin-top: 20px;
            border-radius: 40px;
            font-size: 16px;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(0, 255, 133, 0.25);
        }

        .btn:hover {
            transform: translateY(-4px);
            filter: brightness(1.15);
            box-shadow: 0 20px 50px rgba(0, 130, 255, 0.5);
        }

        .btn:active {
            transform: translateY(2px);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            animation: none;
        }

        #result-display {
            margin-top: 25px;
            font-size: clamp(22px, 4.5vw, 36px);
            font-weight: 700;
            color: var(--secondary);
            text-shadow: 0 0 25px rgba(0, 255, 133, 0.7);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-msg {
            margin-top: 8px;
            font-size: 14px;
            opacity: 0.8;
            min-height: 20px;
        }

        @media (max-width: 550px) {
            :root { --wheel-size: 320px; }

            .panel {
                padding: 35px 20px;
                border-radius: 30px;
            }

            .input-row {
                flex-direction: column;
                gap: 0;
            }

            .btn-spin {
                min-width: 180px;
                padding: 12px 25px;
                margin-top: 16px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo-viatec.png" class="logo-img" alt="Logo ViaTec">

    <div id="intro-screen" class="panel">
        <h2 class="promo-text">GIRE A</h2>
        <h2 class="promo-text"><span>ROLETA</span></h2>
        <h2 class="promo-text" style="font-size: 24px;">E GANHE</h2>
        <div class="reward-badge">BRINDES E BENEFÍCIOS</div>
        <p class="panel-desc" style="margin-top: 25px;">Uma oportunidade exclusiva para você.</p>
        <button class="btn btn-primary" onclick="showLeadForm()">COMEÇAR AGORA</button>
    </div>

    <div id="lead-form" class="panel">
        <h2 class="promo-text" style="font-size: 28px; margin-bottom: 20px;">AUTENTICAÇÃO</h2>
        <p class="panel-desc">Preencha seus dados para liberar o scanner de prêmios.</p>

        <div class="input-group">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--primary)"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <input type="text" id="userName" placeholder="Nome Completo">
        </div>

        <div class="input-group">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--primary)"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            <input type="email" id="userEmail" placeholder="Seu melhor E-mail">
        </div>

        <div class="input-row">
            <div class="input-group">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--primary)"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.26 1.12.32 2.33.5 3.57.5.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.18 2.45.5 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                <input type="tel" id="userTel" placeholder="(00) 00000-0000" maxlength="15">
            </div>
            <div class="input-group">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--primary)"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                <input type="text" id="userCity" placeholder="Sua Cidade">
            </div>
        </div>

        <button class="btn btn-primary" onclick="validateAndStart()">ENTRAR NO JOGO</button>
    </div>

    <div id="wheel-game">
        <div class="wheel-stage">
            <div class="pointer-scanner">
                <svg width="50" height="60" viewBox="0 0 50 60">
                    <path d="M25 60 L50 0 L0 0 Z" fill="var(--secondary)"/>
                </svg>
            </div>

            <div class="static-rim"></div>

            <div class="cyber-hub">
                <div style="width: 20px; height: 20px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 20px var(--primary);"></div>
            </div>

            <canvas id="canvas" width="1000" height="1000"></canvas>
        </div>

        <button class="btn btn-spin" id="spinBtn" onclick="executeSpin()">GIRAR</button>
        <div id="result-display"></div>
        <div id="status-msg" class="status-msg"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>
    const SUPABASE_URL = "https://plkvgekbngrznillyupa.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_4g8etYpP50dsAgXZsM8nfg_Mu6roIt0";

    const telInput = document.getElementById('userTel');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const resultDisplay = document.getElementById('result-display');
    const statusMsg = document.getElementById('status-msg');

    let currentRotation = 0;
    let wheelDrawn = false;

    telInput.addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    const prizes = [
        { t: "INSTALAÇÃO", s: "GRÁTIS", i: "📡" },
        { t: "DESCONTO", s: "30% OFF", i: "💎" },
        { t: "MENSALIDADE", s: "ISENTA", i: "🎁" },
        { t: "UPGRADE", s: "DOBRO MEGA", i: "🚀" },
        { t: "ROTEADOR", s: "GIGA", i: "📶" },
        { t: "WIFI", s: "TURBINADO", i: "⚡" },
        { t: "COMBO", s: "EXCLUSIVO", i: "📺" }
    ];

    function drawWheel() {
        const sections = prizes.length;
        const arc = (2 * Math.PI) / sections;
        const centerX = 500;
        const centerY = 500;
        const radius = 500;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < sections; i++) {
            const angle = i * arc;

            ctx.save();
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius - 2, angle, angle + arc);

            const grad = ctx.createRadialGradient(centerX, centerY, 100, centerX, centerY, radius);
            grad.addColorStop(0, "#0a172e");
            grad.addColorStop(1, i % 2 === 0 ? "#1e2c4e" : "#070b14");

            ctx.fillStyle = grad;
            ctx.fill();

            ctx.strokeStyle = "rgba(0, 212, 255, 0.1)";
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.translate(centerX, centerY);
            ctx.rotate(angle + arc / 2);
            ctx.textAlign = "center";

            ctx.font = "60px Arial";
            ctx.fillStyle = "white";
            ctx.fillText(prizes[i].i, 380, -10);

            ctx.font = "bold 28px Rajdhani";
            ctx.fillText(prizes[i].t, 380, 40);

            ctx.fillStyle = "#00ff85";
            ctx.font = "bold 22px Rajdhani";
            ctx.fillText(prizes[i].s, 380, 75);

            ctx.restore();
        }

        wheelDrawn = true;
    }

    async function salvarLeadNoSupabase(lead) {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/leads`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "apikey": SUPABASE_ANON_KEY,
                "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                "Prefer": "return=minimal"
            },
            body: JSON.stringify(lead)
        });

        if (!response.ok) {
            const erro = await response.text();
            throw new Error(erro || "Erro ao salvar lead");
        }
    }

    function showLeadForm() {
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('lead-form').style.display = 'flex';
    }

    function validateAndStart() {
        const nome = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const tel = document.getElementById('userTel').value.trim();
        const cidade = document.getElementById('userCity').value.trim();

        if (nome.length < 3) { alert("Protocolo Errado: Nome muito curto."); return; }
        if (!email.includes('@')) { alert("Protocolo Errado: E-mail inválido."); return; }
        if (tel.length < 14) { alert("Protocolo Errado: Telefone incompleto."); return; }
        if (cidade.length < 2) { alert("Protocolo Errado: Informe sua cidade."); return; }

        document.getElementById('lead-form').style.display = 'none';
        document.getElementById('wheel-game').style.display = 'flex';
        statusMsg.textContent = "";

        if (!wheelDrawn) {
            drawWheel();
        }
    }

    function soltarFogos() {
        const duration = 2200;
        const animationEnd = Date.now() + duration;

        const defaults = {
            startVelocity: 35,
            spread: 360,
            ticks: 80,
            zIndex: 9999
        };

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        const interval = setInterval(() => {
            const timeLeft = animationEnd - Date.now();

            if (timeLeft <= 0) {
                clearInterval(interval);
                return;
            }

            const particleCount = 45;

            confetti({
                ...defaults,
                particleCount,
                origin: {
                    x: randomInRange(0.1, 0.3),
                    y: randomInRange(0.2, 0.5)
                }
            });

            confetti({
                ...defaults,
                particleCount,
                origin: {
                    x: randomInRange(0.7, 0.9),
                    y: randomInRange(0.2, 0.5)
                }
            });

            confetti({
                ...defaults,
                particleCount: 30,
                scalar: 1.2,
                origin: {
                    x: 0.5,
                    y: 0.3
                }
            });
        }, 250);
    }

    function voltarInicio() {
        resultDisplay.innerHTML = "";
        statusMsg.textContent = "";

        spinBtn.innerText = "GIRAR";
        spinBtn.disabled = false;

        currentRotation = 0;
        canvas.style.transition = "none";
        canvas.style.transform = "rotate(0deg)";

        setTimeout(() => {
            canvas.style.transition = "transform 9s cubic-bezier(0.15, 0, 0, 1)";
        }, 50);

        document.getElementById('userName').value = "";
        document.getElementById('userEmail').value = "";
        document.getElementById('userTel').value = "";
        document.getElementById('userCity').value = "";

        document.getElementById('wheel-game').style.display = "none";
        document.getElementById('lead-form').style.display = "none";
        document.getElementById('intro-screen').style.display = "flex";
    }

    async function executeSpin() {
        if (spinBtn.disabled) return;

        spinBtn.disabled = true;
        spinBtn.innerText = "ROTACIONANDO...";
        statusMsg.textContent = "";

        const rotations = 360 * 12;
        const randomAngle = Math.floor(Math.random() * 360);
        const totalRotation = currentRotation + rotations + randomAngle;

        canvas.style.transform = `rotate(${totalRotation}deg)`;

        setTimeout(async () => {
            const finalAngle = totalRotation % 360;
            const winIdx = Math.floor(((360 - finalAngle + 270) % 360) / (360 / prizes.length)) % prizes.length;
            const win = prizes[winIdx];

            resultDisplay.innerHTML = `🎉 PARABÉNS VOCÊ GANHOU:<br>${win.t} ${win.s}`;
            soltarFogos();

            const lead = {
                nome: document.getElementById('userName').value.trim(),
                email: document.getElementById('userEmail').value.trim(),
                telefone: document.getElementById('userTel').value.trim(),
                cidade: document.getElementById('userCity').value.trim(),
                premio: `${win.t} ${win.s}`
            };

            try {
                await salvarLeadNoSupabase(lead);
                statusMsg.textContent = "Lead salvo com sucesso.";
            } catch (e) {
                console.error("Erro ao salvar lead:", e);
                statusMsg.textContent = "Erro ao salvar lead.";
            }

            spinBtn.innerText = "PRÊMIO DETECTADO";
            currentRotation = totalRotation % 360;

            setTimeout(() => {
                voltarInicio();
            }, 5000);

        }, 9000);
    }
</script>

</body>
</html>
